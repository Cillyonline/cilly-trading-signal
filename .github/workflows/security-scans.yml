name: Security Scans

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/security-scans.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "infra/**"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependencies:
    name: Dependency visibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run npm audit
        working-directory: apps/web
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python - <<'PY'
          import subprocess
          import sys
          import tomllib

          with open("apps/api/pyproject.toml", "rb") as pyproject:
              dependencies = tomllib.load(pyproject)["project"]["dependencies"]

          subprocess.check_call([sys.executable, "-m", "pip", "install", *dependencies])
          PY

      - name: Run pip-audit
        run: pip-audit --local --desc --progress-spinner off
        continue-on-error: true

  containers:
    name: Container visibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t cilly-api-scan:${{ github.sha }} -f apps/api/Dockerfile apps/api

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cilly-api-scan:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "0"

      - name: Build web image
        run: docker build -t cilly-web-scan:${{ github.sha }} -f apps/web/Dockerfile apps/web

      - name: Scan web image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cilly-web-scan:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "0"
